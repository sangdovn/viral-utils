# Maximum line length used by Ruff formatter and linter
line-length = 88

# Number of spaces per indentation level
indent-width = 4

[lint]
select = [
  "E",   # pycodestyle errors (PEP 8 violations)
  "W",   # pycodestyle warnings
  "F",   # pyflakes (unused imports, undefined names, etc.)
  "I",   # isort (import sorting)
  "UP",  # pyupgrade (modern Python syntax)
  "B",   # flake8-bugbear (common bugs and footguns)
  "SIM", # flake8-simplify (simpler, cleaner code patterns)
  "RUF", # Ruff-specific rules and improvements
]

# Ignore rules that conflict with the formatter or project preferences
ignore = [
  "B008", # allow function calls in default arguments (e.g. Depends() in FastAPI)
  "E501", # let the formatter handle code wrapping; allow long comments/prompts
  "RUF001", # allow intentional non-ASCII symbols in translation prompts
]

# Allow Ruff to automatically fix any rule that supports fixing
fixable = ["ALL"]

[lint.per-file-ignores]
# Allow re-export patterns such as:
# from .models import User
"__init__.py" = ["F401"]

[lint.isort]
# Keep imports from the same module on one line when possible
force-single-line = false

# Combine compatible aliased imports
combine-as-imports = true

[format]
# Use double quotes consistently
quote-style = "double"

# Use spaces instead of tabs
indent-style = "space"

# Respect trailing commas for stable multiline formatting
skip-magic-trailing-comma = false
